# Sincroniza la carpeta backend/ a un Space de Hugging Face en cada push a main.
# El Space (SDK Docker) construye la imagen y arranca el backend.
#
# Configúralo UNA vez:
#  1. Hugging Face → New Space → SDK: Docker → nombre p. ej. "xcup-backend".
#  2. HF → Settings → Access Tokens → New token (rol "Write") → copia el token.
#  3. GitHub → repo → Settings → Secrets and variables → Actions:
#       - HF_TOKEN  = el token de escritura
#       - HF_SPACE  = "tu-usuario/xcup-backend"
#  4. (Frontend) pon VITE_API_URL = https://tu-usuario-xcup-backend.hf.space
name: deploy-hf-space
on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-hf-space.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push backend/ al Space de HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_SPACE}" ]; then
            echo "Faltan los secrets HF_TOKEN y/o HF_SPACE"; exit 1
          fi
          cd backend
          git init -q
          git checkout -q -b main
          git config user.email "deploy@github-actions"
          git config user.name "github-actions"
          git add -A
          git commit -q -m "sync desde github ${GITHUB_SHA}"
          git push -f "https://github-actions:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" main:main
          echo "Backend sincronizado al Space ${HF_SPACE}."
